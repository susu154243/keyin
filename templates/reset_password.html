<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>重置密码 - 刻印 KeyIn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .wrapper { max-width: 480px; margin: 60px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 32px; }
        h1 { text-align: center; font-size: 1.5rem; color: #333; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.9rem; font-weight: 600; color: #555; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
        input:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,0.15); }
        .btn { display: block; width: 100%; padding: 10px 20px; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; background: #4a90d9; color: #fff; }
        .btn:hover { background: #3a7bc8; }
        .alert { padding: 10px 12px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; }
        .alert-danger { background: #fee; color: #c00; border: 1px solid #fcc; }
        .alert-success { background: #efe; color: #090; border: 1px solid #cfc; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1><i class="fas fa-key"></i> 重置密码</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert {% if category == 'error' %}alert-danger{% elif category == 'success' %}alert-success{% else %}alert-info{% endif %}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="post">
            <input type="hidden" name="token" value="{{ request.args.get('token', '') }}">
            <div class="form-group">
                <label for="new_password">新密码</label>
                <input type="password" id="new_password" name="new_password" required minlength="8" placeholder="至少8个字符">
            </div>
            <div class="form-group">
                <label for="confirm_password">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="再次输入密码">
            </div>
            <button type="submit" class="btn">保存新密码</button>
        </form>
    </div>
</body>
</html>
